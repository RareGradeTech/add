<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#131314" />
  <title>Steward Lens | Rare Grade Tech</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* ══════════════════════════════════════════
       THEME SYSTEM
    ══════════════════════════════════════════ */
    :root {
        --bg-main: #FFFFFF;
        --bg-sidebar: #F0F4F9;
        --bg-hover: #E1E5EA;
        --text-primary: #1F1F1F;
        --text-secondary: #444746;
        --text-muted: #8E918F;
        --border-color: #E3E3E3;
        --brand-blue: #0A56D9;
        --shadow-color: rgba(0,0,0,0.08);
        --radius-pill: 32px;
        --radius-card: 24px;
        --ui-overlay-bg: rgba(255, 255, 255, 0.85);
    }

    [data-theme="dark"] {
        --bg-main: #131314;
        --bg-sidebar: #1E1F20;
        --bg-hover: #333537;
        --text-primary: #E3E3E3;
        --text-secondary: #C4C7C5;
        --text-muted: #8E918F;
        --border-color: #444746;
        --brand-blue: #A8C7FA;
        --shadow-color: rgba(0,0,0,0.3);
        --ui-overlay-bg: rgba(30, 31, 32, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-main); color: var(--text-primary); height: 100svh; display: flex; overflow: hidden; transition: background 0.3s ease, color 0.3s ease; }

    /* ════ SIDEBAR ════ */
    .sidebar { width: 300px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 16px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; border-right: 1px solid var(--border-color); }
    .sidebar-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; padding-left: 12px; }
    
    /* ════ MAIN CONTENT WRAPPER ════ */
    .main-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }
    
    /* FLOATING HEADER */
    .header { height: 64px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: absolute; top: 0; left: 0; right: 0; z-index: 100; pointer-events: none; }
    .header * { pointer-events: auto; } /* Ensure buttons remain clickable */
    
    .menu-toggle { background: var(--ui-overlay-bg); border: 1px solid var(--border-color); cursor: pointer; color: var(--text-secondary); display: none; padding: 10px; border-radius: 50%; backdrop-filter: blur(8px); box-shadow: 0 4px 12px var(--shadow-color); }
    .theme-toggle { background: var(--ui-overlay-bg); border: 1px solid var(--border-color); cursor: pointer; color: var(--text-secondary); padding: 10px; border-radius: 50%; display: flex; transition: all 0.2s; backdrop-filter: blur(8px); box-shadow: 0 4px 12px var(--shadow-color); }
    .theme-toggle:hover, .menu-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ════ FULLSCREEN WORKSPACE ════ */
    .workspace { position: relative; width: 100%; height: 100%; overflow: hidden; flex: 1; }
    
    #detectionContainer { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
    #webcam { width: 100%; height: 100%; object-fit: cover; display: none; }
    #outputCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
    
    .status-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: rgba(0,0,0,0.75); color: white; z-index: 3; text-align: center; padding: 20px; backdrop-filter: blur(12px); }
    .status-overlay h2 { font-weight: 500; font-size: 1.5rem; }
    .status-overlay p { color: #ccc; font-size: 0.95rem; max-width: 300px; }

    /* ════ FLOATING CONTROLS ════ */
    .control-panel { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--ui-overlay-bg); padding: 12px 24px; border-radius: var(--radius-pill); border: 1px solid var(--border-color); display: flex; gap: 16px; box-shadow: 0 10px 32px var(--shadow-color); z-index: 100; backdrop-filter: blur(8px); }
    
    .btn { display: flex; align-items: center; gap: 10px; background: var(--brand-blue); color: white; border: none; padding: 12px 24px; border-radius: var(--radius-pill); font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(10, 86, 217, 0.4); }
    .btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
    .btn.stop { background: #E63946; }
    .btn.stop:hover { box-shadow: 0 6px 16px rgba(230, 57, 70, 0.4); }

    .loader { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive Configurations */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.25); }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title" style="margin-top: 20px;">Steward Lens</div>
    <div style="padding: 12px; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5;">
      Real-time hardware object detection system powered by MediaPipe.
    </div>
  </aside>

  <main class="main-wrapper">
    <header class="header">
      <button class="menu-toggle" id="menuToggle"><i data-feather="menu"></i></button>
      <div style="flex:1;"></div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i data-feather="sun" id="themeIcon"></i></button>
    </header>

    <div class="workspace">
      <div id="detectionContainer">
        <div class="status-overlay" id="statusOverlay">
          <div class="loader" id="loadingSpinner"></div>
          <h2 id="statusTitle">Initializing AI...</h2>
          <p id="statusDesc">Downloading EfficientDet-Lite0 model and securing Firebase connection.</p>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
      </div>
    </div>

    <div class="control-panel">
      <button class="btn" id="toggleCameraBtn" disabled>
        <i data-feather="camera"></i> Start Camera
      </button>
    </div>
  </main>

  <script type="module">
    // ════ 1. FIREBASE IMPORTS & CONFIG ════
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getRemoteConfig, fetchAndActivate, getValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-remote-config.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
      authDomain: "test-17881.firebaseapp.com",
      databaseURL: "https://test-17881-default-rtdb.firebaseio.com",
      projectId: "test-17881",
      storageBucket: "test-17881.firebasestorage.app",
      messagingSenderId: "1057428047643",
      appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const remoteConfig = getRemoteConfig(app);
    remoteConfig.settings.minimumFetchIntervalMillis = 0;

    // ════ 2. X.AI (GROK) API INTEGRATION ════
    const API_BASE = "https://api.x.ai/v1";
    let XAI_API_KEY = "";
    
    async function loadKey() { 
      try { 
        await fetchAndActivate(remoteConfig); 
        XAI_API_KEY = getValue(remoteConfig, 'xai_api_key').asString(); 
        console.log("Grok API Key loaded successfully.");
      } catch(e) { 
        console.error("Failed to load API key from Firebase:", e); 
      } 
    }
    loadKey();

    window.analyzeWithGrok = async function(promptText) {
      if (!XAI_API_KEY) return console.error("No API Key available.");
      try {
        const res = await fetch(`${API_BASE}/chat/completions`, { 
          method: 'POST', 
          headers: {
            'Authorization': `Bearer ${XAI_API_KEY}`,
            'Content-Type': 'application/json'
          }, 
          body: JSON.stringify({ 
            model: "grok-4-1-fast-reasoning", 
            messages: [{ role: "user", content: promptText }] 
          }) 
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        return data.choices[0].message.content;
      } catch(err) {
        console.error("Grok API Error:", err);
      }
    };

    // ════ 3. MEDIAPIPE IMPORTS ════
    import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
    feather.replace();

    // ════ UI LOGIC ════
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      themeIcon.setAttribute('data-feather', next === 'dark' ? 'sun' : 'moon');
      feather.replace();
    });

    // Toggle Sidebar Interaction
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation(); // Stop propagation to avoid immediate outside click catch
      sidebar.classList.toggle('open');
    });

    // NEW: Close sidebar when touching/clicking anywhere outside of it
    document.addEventListener('click', (event) => {
      const isClickInsideSidebar = sidebar.contains(event.target);
      const isClickOnMenuToggle = menuToggle.contains(event.target);

      if (!isClickInsideSidebar && !isClickOnMenuToggle && sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
      }
    });

    // ════ CAMERA & AI LOGIC ════
    let objectDetector;
    let webcamRunning = false;
    let lastVideoTime = -1;
    let animationFrameId;

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("outputCanvas");
    const canvasCtx = canvasElement.getContext("2d");
    
    const statusOverlay = document.getElementById("statusOverlay");
    const statusTitle = document.getElementById("statusTitle");
    const statusDesc = document.getElementById("statusDesc");
    const loadingSpinner = document.getElementById("loadingSpinner");
    const toggleBtn = document.getElementById("toggleCameraBtn");

    async function initializeAI() {
      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        objectDetector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`,
            delegate: "GPU"
          },
          scoreThreshold: 0.5,
          runningMode: "VIDEO"
        });
        
        statusOverlay.style.display = "none";
        toggleBtn.disabled = false;
        
      } catch (error) {
        console.error("AI Init Error:", error);
        statusTitle.innerText = "Error Loading AI";
        statusDesc.innerText = "Please check your internet connection and refresh.";
        loadingSpinner.style.display = "none";
      }
    }

    initializeAI();

    toggleBtn.addEventListener('click', () => {
      if (!objectDetector) return;
      if (webcamRunning) {
        stopCamera();
      } else {
        startCamera();
      }
    });

    async function startCamera() {
      webcamRunning = true;
      toggleBtn.innerHTML = '<i data-feather="stop-circle"></i> Stop Camera';
      toggleBtn.classList.add('stop');
      feather.replace();

      const constraints = {
        video: { facingMode: "environment" }
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.style.display = "block";
        video.srcObject = stream;
        video.addEventListener("loadeddata", predictWebcam);
      } catch (err) {
        console.error("Camera Error:", err);
        alert("Camera access denied or unavailable.");
        stopCamera();
      }
    }

    function stopCamera() {
      webcamRunning = false;
      toggleBtn.innerHTML = '<i data-feather="camera"></i> Start Camera';
      toggleBtn.classList.remove('stop');
      feather.replace();
      
      video.style.display = "none";
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
      if (animationFrameId) {
        window.cancelAnimationFrame(animationFrameId);
      }
    }

    async function predictWebcam() {
      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;
      
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const detections = objectDetector.detectForVideo(video, performance.now());
        drawDetections(detections);
      }
      
      if (webcamRunning) {
        animationFrameId = window.requestAnimationFrame(predictWebcam);
      }
    }

    function drawDetections(result) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      for (let detection of result.detections) {
        const x = detection.boundingBox.originX;
        const y = detection.boundingBox.originY;
        const w = detection.boundingBox.width;
        const h = detection.boundingBox.height;
        const labelText = `${detection.categories[0].categoryName} (${Math.round(detection.categories[0].score * 100)}%)`;

        canvasCtx.beginPath();
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeStyle = "#A8C7FA"; 
        canvasCtx.rect(x, y, w, h);
        canvasCtx.stroke();
        
        canvasCtx.fillStyle = "#A8C7FA";
        canvasCtx.fillRect(x, y - 25, canvasCtx.measureText(labelText).width + 16, 25);
        
        canvasCtx.fillStyle = "#131314"; 
        canvasCtx.font = "600 14px 'DM Sans', sans-serif";
        canvasCtx.fillText(labelText, x + 8, y - 7);
      }
    }
  </script>
</body>
</html>
