<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#131314" />
  <title>Steward Lens | Traffic & Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    :root {
        --bg-main: #F8F9FA; 
        --bg-card: rgba(255, 255, 255, 0.85);
        --text-primary: #1F1F1F; 
        --text-secondary: #444746; 
        --text-muted: #8E918F;
        --border-color: rgba(0, 0, 0, 0.08); 
        --brand-blue: #0A56D9; 
        --shadow-color: rgba(0,0,0,0.06);
        --radius-pill: 32px;
    }
    [data-theme="dark"] {
        --bg-main: #0F0F10; 
        --bg-card: rgba(30, 31, 32, 0.85);
        --text-primary: #E3E3E3; 
        --text-secondary: #C4C7C5; 
        --text-muted: #8E918F;
        --border-color: rgba(255, 255, 255, 0.08); 
        --brand-blue: #A8C7FA; 
        --shadow-color: rgba(0,0,0,0.4);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
        font-family: 'DM Sans', sans-serif; 
        background: var(--bg-main); 
        color: var(--text-primary); 
        height: 100svh; 
        display: flex; 
        flex-direction: column;
        overflow: hidden; 
        transition: background 0.3s ease, color 0.3s ease; 
    }

    /* HEADER */
    .header { 
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        height: 56px; 
        padding: 0 16px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        z-index: 100; 
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        box-shadow: 0 4px 24px var(--shadow-color);
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand h1 { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; }
    .brand span { font-size: 0.75rem; color: var(--text-muted); background: var(--border-color); padding: 2px 6px; border-radius: 6px; }
    
    .theme-toggle { 
        background: none; 
        border: none; 
        cursor: pointer; 
        color: var(--text-secondary); 
        padding: 8px; 
        display: flex; 
        transition: transform 0.2s;
    }
    .theme-toggle:active { transform: scale(0.9); }

    /* WORKSPACE */
    .workspace { 
        position: relative; 
        width: 100%; 
        flex: 1;
        background: #000; 
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    #webcam, .detectionCanvas { 
        width: 100%; 
        height: 100%; 
        object-fit: contain; 
        position: absolute;
        top: 0;
        left: 0;
    }
    .detectionCanvas { z-index: 2; pointer-events: none; }

    .status-overlay { 
        position: absolute; 
        inset: 0; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        gap: 16px; 
        background: rgba(15, 15, 16, 0.95); 
        color: white; 
        z-index: 3; 
        text-align: center; 
        padding: 24px; 
        backdrop-filter: blur(20px); 
        -webkit-backdrop-filter: blur(20px);
    }
    .status-overlay h2 { font-size: 1.2rem; font-weight: 600; }
    .status-overlay p { font-size: 0.85rem; color: #8E918F; max-width: 280px; line-height: 1.4; }

    /* CONTROLS */
    .control-panel { 
        position: absolute; 
        bottom: calc(24px + env(safe-area-inset-bottom)); 
        left: 50%; 
        transform: translateX(-50%); 
        background: var(--bg-card); 
        padding: 8px; 
        border-radius: var(--radius-pill); 
        border: 1px solid var(--border-color); 
        display: flex; 
        gap: 8px; 
        box-shadow: 0 12px 32px var(--shadow-color); 
        z-index: 100; 
        backdrop-filter: blur(12px); 
        -webkit-backdrop-filter: blur(12px);
        width: calc(100% - 32px);
        max-width: 340px;
    }
    .btn { 
        display: flex; 
        align-items: center; 
        justify-content: center;
        gap: 8px; 
        background: var(--brand-blue); 
        color: #131314; 
        border: none; 
        padding: 14px; 
        flex: 1;
        border-radius: var(--radius-pill); 
        font-family: inherit; 
        font-size: 0.95rem; 
        font-weight: 600; 
        cursor: pointer; 
        transition: all 0.2s; 
        white-space: nowrap; 
    }
    [data-theme="dark"] .btn { color: #131314; } 
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.5; }
    .btn.stop { background: #E63946; color: white; }
    
    .nav-link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--border-color);
        color: var(--text-primary);
        text-decoration: none;
        transition: background 0.2s;
    }
    .nav-link-btn:hover { background: var(--text-muted); }

    .loader { width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; animation: spin 0.8s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <h1>Steward Lens</h1>
      <span>Traffic ANPR Suite</span>
    </div>
    <button class="theme-toggle" id="themeToggle"><i data-feather="sun" id="themeIcon"></i></button>
  </header>

  <main class="workspace">
    <div class="status-overlay" id="statusOverlay">
      <div class="loader"></div>
      <h2>Initializing Core Vision...</h2>
      <p>Synchronizing local neural processing engines and text tracking models.</p>
    </div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="outputCanvas" class="detectionCanvas"></canvas>
  </main>
  
  <div class="control-panel">
    <button class="btn" id="toggleCameraBtn" disabled><i data-feather="camera"></i> Start Tracking</button>
    <a href="enroll.html" class="nav-link-btn" title="Register Identity"><i data-feather="user-plus"></i></a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
      authDomain: "test-17881.firebaseapp.com",
      databaseURL: "https://test-17881-default-rtdb.firebaseio.com",
      projectId: "test-17881",
      storageBucket: "test-17881.firebasestorage.app",
      messagingSenderId: "1057428047643",
      appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    import { ObjectDetector, FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
    feather.replace();

    let objectDetector, faceDetector;
    let webcamRunning = false;
    let lastVideoTime = -1;
    let registeredIdentities = {}; 

    // OCR Memory Management State Variables
    const ocrCanvas = document.createElement('canvas');
    const ocrCtx = ocrCanvas.getContext('2d');
    let activeLicensePlate = "ANALYZING...";
    let isOcrBusy = false;
    let lastOcrTimestamp = 0;

    onValue(ref(db, 'biometric_profiles'), (snapshot) => {
      if(snapshot.exists()) registeredIdentities = snapshot.val();
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      document.getElementById('themeIcon').setAttribute('data-feather', next === 'dark' ? 'sun' : 'moon');
      feather.replace();
    });

    async function initializeComputerVision() {
      try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
        objectDetector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`, delegate: "GPU" },
          scoreThreshold: 0.45, runningMode: "VIDEO"
        });
        faceDetector = await FaceDetector.createFromOptions(vision, {
          baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite`, delegate: "GPU" },
          runningMode: "VIDEO"
        });
        document.getElementById("statusOverlay").style.display = "none";
        document.getElementById("toggleCameraBtn").disabled = false;
      } catch (err) { console.error("Framework failure:", err); }
    }
    initializeComputerVision();

    function extractFaceVector(face, wWidth, wHeight) {
      if (!face || !face.keypoints || face.keypoints.length === 0) return null;
      const { originX, originY, width, height } = face.boundingBox;
      const normOriginX = originX / wWidth;
      const normOriginY = originY / wHeight;
      const normWidth = width / wWidth;
      const normHeight = height / wHeight;
      
      const vector = [];
      face.keypoints.forEach(kp => {
        vector.push((kp.x - normOriginX) / normWidth, (kp.y - normOriginY) / normHeight);
      });
      return vector;
    }

    function calculateEuclideanDistance(v1, v2) {
      if (!v1 || !v2 || v1.length !== v2.length) return Infinity;
      let sum = 0;
      for (let i = 0; i < v1.length; i++) sum += Math.pow(v1[i] - v2[i], 2);
      return Math.sqrt(sum);
    }

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("outputCanvas");
    const canvasCtx = canvasElement.getContext("2d");
    const toggleBtn = document.getElementById("toggleCameraBtn");

    toggleBtn.addEventListener('click', () => {
      if (webcamRunning) stopCamera(); else startCamera();
    });

    async function startCamera() {
      webcamRunning = true;
      toggleBtn.innerHTML = '<i data-feather="stop-circle"></i> Pause Stream';
      toggleBtn.classList.add('stop'); feather.replace();
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.addEventListener("loadeddata", renderLoop);
      } catch (e) { stopCamera(); }
    }

    function stopCamera() {
      webcamRunning = false;
      toggleBtn.innerHTML = '<i data-feather="camera"></i> Start Tracking';
      toggleBtn.classList.remove('stop'); feather.replace();
      if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    }

    function renderLoop() {
      if (!webcamRunning) return;
      
      canvasElement.width = video.videoWidth; 
      canvasElement.height = video.videoHeight;
      
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        const objects = objectDetector.detectForVideo(video, performance.now());
        const faces = faceDetector.detectForVideo(video, performance.now());
        
        // Process Tracking Bounds
        for (let d of objects.detections) {
          const category = d.categories[0].categoryName;
          const score = Math.round(d.categories[0].score * 100);
          
          if (category === "person") continue; 
          
          if (["car", "truck", "bus", "motorcycle"].includes(category)) {
            renderBox(d.boundingBox, `🚙 ${category.toUpperCase()} (${score}%)`, "#00E676");
            
            // Calculate a relative license plate bounding target relative to vehicle location
            const targetX = Math.max(0, d.boundingBox.originX + (d.boundingBox.width * 0.20));
            const targetY = Math.max(0, d.boundingBox.originY + (d.boundingBox.height * 0.60));
            const targetW = Math.min(video.videoWidth - targetX, d.boundingBox.width * 0.60);
            const targetH = Math.min(video.videoHeight - targetY, d.boundingBox.height * 0.25);

            const plateBox = { originX: targetX, originY: targetY, width: targetW, height: targetH };

            // Process OCR asynchronous updates dynamically to prevent interface lockups
            if (performance.now() - lastOcrTimestamp > 1000 && !isOcrBusy && targetW > 30 && targetH > 15) {
              isOcrBusy = true;
              lastOcrTimestamp = performance.now();

              // Size the processing cache canvas exactly to match the passing registration matrix
              ocrCanvas.width = targetW;
              ocrCanvas.height = targetH;
              ocrCtx.drawImage(video, targetX, targetY, targetW, targetH, 0, 0, targetW, targetH);

              // Use high contrast optimization character parsing
              Tesseract.recognize(ocrCanvas, 'eng', {
                parameters: { tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789- ' }
              }).then(({ data: { text } }) => {
                const cleanStr = text.trim().replace(/[^A-Z0-9- ]/g, "");
                if (cleanStr.length >= 3) {
                  activeLicensePlate = cleanStr;
                }
                isOcrBusy = false;
              }).catch(() => { isOcrBusy = false; });
            }

            // Directly overlays the live deciphered text strings onto the license box viewport
            renderPlateAnchor(plateBox, `PLATE: ${activeLicensePlate}`);
          } else {
            renderBox(d.boundingBox, `${category} (${score}%)`, "#A8C7FA");
          }
        }
        
        for (let f of faces.detections) {
          let label = "Unknown Individual", color = "#E63946"; 
          if (f.keypoints) {
            const liveVec = extractFaceVector(f, video.videoWidth, video.videoHeight);
            let minDist = Infinity, matchName = "";
            for (let k in registeredIdentities) {
              const dist = calculateEuclideanDistance(liveVec, registeredIdentities[k].vector);
              if (dist < minDist) { minDist = dist; matchName = registeredIdentities[k].name; }
            }
            if (minDist < 0.16) { label = matchName; color = "#34A853"; }
          }
          renderBox(f.boundingBox, label, color);
        }
      }
      requestAnimationFrame(renderLoop);
    }

    function renderBox(box, label, color) {
      const { originX: x, originY: y, width: w, height: h } = box;
      canvasCtx.beginPath(); canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = color;
      canvasCtx.rect(x, y, w, h); canvasCtx.stroke();
      canvasCtx.fillStyle = color; canvasCtx.font = "600 15px 'DM Sans', sans-serif";
      canvasCtx.fillRect(x, y - 28, canvasCtx.measureText(label).width + 16, 28);
      canvasCtx.fillStyle = "#131314"; canvasCtx.fillText(label, x + 8, y - 9);
    }

    function renderPlateAnchor(box, label) {
      const { originX: x, originY: y, width: w, height: h } = box;
      canvasCtx.beginPath(); canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = "#FFFF00";
      canvasCtx.rect(x, y, w, h); canvasCtx.stroke();

      // Label background for clear alphanumeric legibility outside
      canvasCtx.fillStyle = "#FFFF00"; canvasCtx.font = "700 13px 'DM Sans', sans-serif";
      canvasCtx.fillRect(x, y - 22, canvasCtx.measureText(label).width + 12, 22);
      canvasCtx.fillStyle = "#000000"; canvasCtx.fillText(label, x + 6, y - 6);
    }
  </script>
</body>
</html>
