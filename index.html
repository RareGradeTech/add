<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | Attendance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .glass-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .pill-btn { border-radius: 9999px; transition: all 0.3s ease; transform: scale(1); }
        .pill-btn:hover { transform: translateY(-1px); filter: brightness(110%); }
        .pill-btn:active { transform: scale(0.96); }
    </style>
</head>
<body class="text-gray-800 flex items-center justify-center min-h-screen">
    <div class="glass-card w-full max-w-md p-10">
        <div class="text-center mb-8">
            <img src="https://i.postimg.cc/05BVVkbb/LOGO-removebg-preview.png" alt="Logo" class="h-12 w-auto mx-auto mb-4">
            <h1 class="text-3xl font-black text-gray-900">Admin Registration</h1>
            <p class="text-gray-500 text-sm mt-2">Register a new admin account. Use your work email associated with Google.</p>
        </div>
        
        <div id="statusBox" class="hidden mb-6 px-5 py-4 rounded-2xl text-sm font-bold"></div>
        
        <form id="adminRegForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase ml-2 mb-2">Full Name</label>
                <input type="text" id="adminName" required placeholder="e.g. Jane Smith" class="w-full rounded-2xl border-gray-100 bg-gray-50 px-6 py-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none border transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase ml-2 mb-2">Job Title / Role</label>
                <input type="text" id="adminRole" required placeholder="e.g. HR Manager" class="w-full rounded-2xl border-gray-100 bg-gray-50 px-6 py-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none border transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase ml-2 mb-2">Work Email (Google Account)</label>
                <input type="email" id="adminEmail" required placeholder="admin@company.com" class="w-full rounded-2xl border-gray-100 bg-gray-50 px-6 py-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none border transition-all">
            </div>
            <button type="submit" id="submitBtn" class="w-full pill-btn bg-blue-600 text-white font-black py-4 text-sm shadow-lg shadow-blue-500/20">REGISTER ADMIN</button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-6">Already registered? <a href="dashboard.html" class="text-blue-600 font-bold">Login to Dashboard</a></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
            authDomain: "test-17881.firebaseapp.com",
            databaseURL: "https://test-17881-default-rtdb.firebaseio.com",
            projectId: "test-17881",
            storageBucket: "test-17881.firebasestorage.app",
            messagingSenderId: "1057428047643",
            appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function showStatus(message, type) {
            const box = document.getElementById('statusBox');
            box.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700', 'bg-amber-50', 'text-amber-700');
            if (type === 'success') box.classList.add('bg-green-50', 'text-green-700');
            else if (type === 'error') box.classList.add('bg-red-50', 'text-red-700');
            else box.classList.add('bg-amber-50', 'text-amber-700');
            box.textContent = message;
            box.classList.remove('hidden');
        }

        document.getElementById('adminRegForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'REGISTERING...';
            btn.disabled = true;
            
            const id = `EMP-${Math.random().toString(16).slice(2, 6).toUpperCase()}`;
            const name = document.getElementById('adminName').value.trim();
            const role = document.getElementById('adminRole').value.trim();
            const email = document.getElementById('adminEmail').value.trim().toLowerCase();
            
            try {
                // Check if email already exists
                const snap = await db.ref('employees').orderByChild('email').equalTo(email).once('value');
                if (snap.exists()) {
                    showStatus('This email is already registered. Please use a different email or login to the dashboard.', 'warning');
                    btn.textContent = 'REGISTER ADMIN';
                    btn.disabled = false;
                    return;
                }
                
                // Save admin to Firebase Realtime Database
                await db.ref('employees/' + id).set({
                    id: id,
                    name: name,
                    role: role,
                    email: email,
                    isAdmin: true,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                showStatus(`✓ Admin registered successfully! Redirecting you to the dashboard...`, 'success');
                document.getElementById('adminRegForm').reset();
                
                // Redirect to dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } catch (err) {
                showStatus('Registration failed: ' + err.message, 'error');
                btn.textContent = 'REGISTER ADMIN';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
